# ============================================================================
# docker-compose.dokploy.yml — Deploy en Dokploy / Ubuntu 24.04
# ============================================================================
#
# Stack: FastAPI (backend) + nginx (frontend SPA)
# Base de datos: MongoDB Atlas (remoto) — sin contenedor MongoDB local
# Auth:          Supabase
#
# Cómo usar en Dokploy:
#   1. Crear una nueva aplicación tipo "Docker Compose" en Dokploy.
#   2. Apuntar al repositorio y seleccionar este archivo como compose file.
#   3. En la sección "Environment Variables" de Dokploy, copiar y completar
#      las variables de .env.dokploy.example
#   4. En Dokploy configurar el dominio y habilitar SSL (Let's Encrypt).
#   5. Hacer deploy.
#
# Notas:
#   - Los servicios usan "expose" (no "ports"): Dokploy/Traefik gestiona
#     el acceso externo y SSL.
#   - VITE_API_URL debe quedar vacío: el frontend llama a /api/... y nginx
#     reenvía al backend dentro de la misma red Docker.
#   - VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY se inyectan en build time.
# ============================================================================

services:
  backend:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    restart: always
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB: ${MONGODB_DB:-Arandanos}
      SIMULATED_DATA_ENABLED: ${SIMULATED_DATA_ENABLED:-false}
      API_PORT: 8000
      API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_MINUTES_ADMIN: ${JWT_ACCESS_MINUTES_ADMIN:-30}
      JWT_ACCESS_HOURS_EMPLOYEE: ${JWT_ACCESS_HOURS_EMPLOYEE:-8}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-}
      MAILERSEND_API_TOKEN: ${MAILERSEND_API_TOKEN:-}
      MAILERSEND_FROM_EMAIL: ${MAILERSEND_FROM_EMAIL:-}
      MAILERSEND_FROM_NAME: ${MAILERSEND_FROM_NAME:-Monitoreo Embalse Arandanos}
      MAILERSEND_TO_EMAILS: ${MAILERSEND_TO_EMAILS:-}
      MAILERSEND_TEMPLATE_ID: ${MAILERSEND_TEMPLATE_ID:-}
    expose:
      - "8000"
    networks:
      - arandanos-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Dejar vacío: el frontend usa /api/... y nginx reenvía al backend
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_DATA_MODE: ${VITE_DATA_MODE:-real}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - arandanos-network

networks:
  arandanos-network:
    driver: bridge
