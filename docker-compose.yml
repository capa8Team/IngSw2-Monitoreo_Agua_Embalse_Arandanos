# Monitoreo Embalse Arándanos — stack Docker
#
# Uso típico (Atlas + API + frontend con nginx y proxy /api):
#   1. Copia .env.example a .env y completa MONGODB_URL con tu URI de MongoDB Atlas.
#   2. docker compose up --build
#
# Frontend: http://localhost:5173  (mapea al puerto 80 del contenedor nginx)
# API directa (desde el host):      http://localhost:8000
#
# El build del frontend deja VITE_API_URL vacío por defecto: el navegador llama
# a /api/... y nginx reenvía a backend:8000 (ver nginx.conf).
# Para desarrollo local con "npm run dev", vite.config.js ya hace proxy de /api → :8000.
#
# Variables requeridas en .env (raíz del repo):
#   MONGODB_URL   → URI de MongoDB Atlas  (mongodb+srv://user:pass@cluster.mongodb.net/...)
#   MONGODB_DB    → Nombre de la base de datos (ej. Arandanos)
#   JWT_SECRET    → Secreto largo y aleatorio para tokens JWT

services:
  backend:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: backend-fastapi
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DB: ${MONGODB_DB:-Arandanos}
      SIMULATED_DATA_ENABLED: "${SIMULATED_DATA_ENABLED:-false}"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-dev-cambiar-en-produccion-embalse-arandanos}
      JWT_ACCESS_MINUTES_ADMIN: ${JWT_ACCESS_MINUTES_ADMIN:-30}
      JWT_ACCESS_HOURS_EMPLOYEE: ${JWT_ACCESS_HOURS_EMPLOYEE:-8}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-123456789}
      MAILERSEND_API_TOKEN: ${MAILERSEND_API_TOKEN:-}
      MAILERSEND_FROM_EMAIL: ${MAILERSEND_FROM_EMAIL:-}
      MAILERSEND_FROM_NAME: ${MAILERSEND_FROM_NAME:-Monitoreo Embalse Arandanos}
      MAILERSEND_TO_EMAILS: ${MAILERSEND_TO_EMAILS:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - arandanos-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Vacío: URLs relativas /api → nginx → backend (recomendado en Docker).
        VITE_API_URL: "${VITE_API_URL:-}"
        VITE_DATA_MODE: "${VITE_DATA_MODE:-simulated}"
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
    container_name: frontend-arandanos
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - arandanos-network

  # PostgreSQL opcional (datos legados / scripts). No requerido para JWT + dashboard actual.
  database:
    image: postgres:17
    container_name: postgres-arandanos
    profiles:
      - postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./backup_proyecto.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arandanos-network

volumes:
  postgres_data:

networks:
  arandanos-network:
    driver: bridge
